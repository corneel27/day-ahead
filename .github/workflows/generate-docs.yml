name: Auto-Generate Documentation

on:
  push:
    paths:
      - 'dao/prog/config/**/*.py'
      - 'scripts/generate_docs.py'
  pull_request:
    paths:
      - 'dao/prog/config/**/*.py'
      - 'scripts/generate_docs.py'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          grep '^pydantic' dao/requirements.txt | xargs pip install
      
      - name: Generate schema and documentation (with validation)
        id: generate
        run: |
          echo "Generating JSON schema and markdown documentation..."
          if python scripts/generate_docs.py; then
            echo "SUCCESS: Schema and documentation generated successfully"
            echo "SUCCESS: All fields have proper documentation"
            echo "validation=success" >> $GITHUB_OUTPUT
          else
            echo "ERROR: Generation failed - some fields missing descriptions"
            echo "validation=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code SETTINGS.md config_schema.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add SETTINGS.md config_schema.json
          git commit -m "Auto-generate documentation from Pydantic models

          - Updated SETTINGS.md
          - Updated config_schema.json
          
          Generated by GitHub Actions workflow"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ github.head_ref }}
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.head_ref }}
          else
            git pull --rebase
            git push
          fi
      